name: Build Zygisk Module

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK & CMake Lama
      run: |
        sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"
        echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/25.1.8937393" >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/cmake/3.22.1/bin" >> $GITHUB_PATH

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Compile with Gradle
      run: ./gradlew :module:assembleRelease

    - name: Upload Finished Module
      uses: actions/upload-artifact@v4
      with:
        name: Zygisk-ESP-Module
        path: |
          out/*.zip
          build/outputs/**/*.zip
